<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
	<title>Project_Yasa</title>
	<style>
		html,
		body,
		#canvas {
			margin: 0;
			padding: 0;
			border: 0;
		}

		body {
			color: white;
			background-color: black;
			overflow: hidden;
			touch-action: none;
		}

		#canvas {
			display: block;
		}

		#canvas:focus {
			outline: none;
		}

		#status,
		#status-splash,
		#status-progress {
			position: absolute;
			left: 0;
			right: 0;
		}

		#status,
		#status-splash {
			top: 0;
			bottom: 0;
		}

		#status {
			background-color: #242424;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			visibility: hidden;
		}

		#status-splash {
			max-height: 100%;
			max-width: 100%;
			margin: auto;
		}

		#status-splash.show-image--false {
			display: none;
		}

		#status-splash.fullsize--true {
			height: 100%;
			width: 100%;
			object-fit: contain;
		}

		#status-splash.use-filter--false {
			image-rendering: pixelated;
		}

		#status-progress,
		#status-notice {
			display: none;
		}

		#status-progress {
			bottom: 10%;
			width: 50%;
			margin: 0 auto;
		}

		#status-notice {
			background-color: #5b3943;
			border-radius: 0.5rem;
			border: 1px solid #9b3943;
			color: #e0e0e0;
			font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
			line-height: 1.3;
			margin: 0 2rem;
			overflow: hidden;
			padding: 1rem;
			text-align: center;
			z-index: 1;
		}

		#mobile-controls {
			display: none;
			position: fixed;
			bottom: 20px;
			width: 100%;
			justify-content: space-between;
			align-items: flex-end;
			padding: 0 30px;
			z-index: 10;
			pointer-events: none;
		}

		#joystick-zone {
			pointer-events: all;
			touch-action: none;
		}

		#joystick-base {
			width: 120px;
			height: 120px;
			border-radius: 50%;
			background: rgba(255, 255, 255, 0.15);
			border: 3px solid rgba(255, 255, 255, 0.4);
			position: relative;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		#joystick-thumb {
			width: 50px;
			height: 50px;
			border-radius: 50%;
			background: rgba(255, 255, 255, 0.6);
			border: 2px solid white;
			position: absolute;
			pointer-events: none;
			transition: transform 0.05s;
		}

		#btn-action {
			width: 80px;
			height: 80px;
			border-radius: 50%;
			background: rgba(255, 100, 100, 0.4);
			border: 3px solid rgba(255, 100, 100, 0.8);
			color: white;
			font-size: 14px;
			font-weight: bold;
			pointer-events: all;
			touch-action: none;
			user-select: none;
		}
	</style>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="Project_Yasa.icon.png" />
	<link rel="apple-touch-icon" href="Project_Yasa.apple-touch-icon.png" />

</head>

<body>
	<div id="mobile-controls">
		<div id="joystick-zone">
			<div id="joystick-base">
				<div id="joystick-thumb"></div>
			</div>
		</div>
		<button id="btn-action">Action</button> <!-- keep any action buttons you need -->
	</div>
	<canvas id="canvas">
		Your browser does not support the canvas tag.
	</canvas>

	<noscript>
		Your browser does not support JavaScript.
	</noscript>

	<div id="status">
		<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="Project_Yasa.png" alt="">
		<progress id="status-progress"></progress>
		<div id="status-notice"></div>
	</div>

	<script src="Project_Yasa.js"></script>
	<script>
		const GODOT_CONFIG = { "args": [], "canvasResizePolicy": 2, "emscriptenPoolSize": 8, "ensureCrossOriginIsolationHeaders": true, "executable": "Project_Yasa", "experimentalVK": false, "fileSizes": { "Project_Yasa.pck": 39068, "Project_Yasa.wasm": 35740641 }, "focusCanvas": true, "gdextensionLibs": [], "godotPoolSize": 4 };
		const GODOT_THREADS_ENABLED = false;
		const engine = new Engine(GODOT_CONFIG);

		(function () {
			const statusOverlay = document.getElementById('status');
			const statusProgress = document.getElementById('status-progress');
			const statusNotice = document.getElementById('status-notice');

			let initializing = true;
			let statusMode = '';

			function setStatusMode(mode) {
				if (statusMode === mode || !initializing) {
					return;
				}
				if (mode === 'hidden') {
					statusOverlay.remove();
					initializing = false;
					return;
				}
				statusOverlay.style.visibility = 'visible';
				statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
				statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
				statusMode = mode;
			}

			function setStatusNotice(text) {
				while (statusNotice.lastChild) {
					statusNotice.removeChild(statusNotice.lastChild);
				}
				const lines = text.split('\n');
				lines.forEach((line) => {
					statusNotice.appendChild(document.createTextNode(line));
					statusNotice.appendChild(document.createElement('br'));
				});
			}

			function displayFailureNotice(err) {
				console.error(err);
				if (err instanceof Error) {
					setStatusNotice(err.message);
				} else if (typeof err === 'string') {
					setStatusNotice(err);
				} else {
					setStatusNotice('An unknown error occurred.');
				}
				setStatusMode('notice');
				initializing = false;
			}

			const missing = Engine.getMissingFeatures({
				threads: GODOT_THREADS_ENABLED,
			});

			if (missing.length !== 0) {
				if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
					let serviceWorkerRegistrationPromise;
					try {
						serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
					} catch (err) {
						serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
					}
					// There's a chance that installing the service worker would fix the issue
					Promise.race([
						serviceWorkerRegistrationPromise.then((registration) => {
							if (registration != null) {
								return Promise.reject(new Error('Service worker already exists.'));
							}
							return registration;
						}).then(() => engine.installServiceWorker()),
						// For some reason, `getRegistration()` can stall
						new Promise((resolve) => {
							setTimeout(() => resolve(), 2000);
						}),
					]).then(() => {
						// Reload if there was no error.
						window.location.reload();
					}).catch((err) => {
						console.error('Error while registering service worker:', err);
					});
				} else {
					// Display the message as usual
					const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
					displayFailureNotice(missingMsg + missing.join('\n'));
				}
			} else {
				setStatusMode('progress');
				engine.startGame({
					'onProgress': function (current, total) {
						if (current > 0 && total > 0) {
							statusProgress.value = current;
							statusProgress.max = total;
						} else {
							statusProgress.removeAttribute('value');
							statusProgress.removeAttribute('max');
						}
					},
				}).then(() => {
					setStatusMode('hidden');
				}, displayFailureNotice);
			}
		}());
	</script>
	<script>
	// Mobile detection
	const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent)
		|| ('ontouchstart' in window)
		|| new URLSearchParams(window.location.search).has('mobile');

	if (isMobile) {
		document.getElementById('mobile-controls').style.display = 'flex';
	}

	// Shared state Godot will poll
	window.godotInputState = { x: 0, y: 0, action: false };

	const base = document.getElementById('joystick-base');
	const thumb = document.getElementById('joystick-thumb');
	const maxDist = 35; // how far the thumb can move from center

	let activeTouchId = null;
	let baseRect = null;

	base.addEventListener('touchstart', (e) => {
		e.preventDefault();
		if (activeTouchId !== null) return; // already tracking a touch
		const touch = e.changedTouches[0];
		activeTouchId = touch.identifier;
		baseRect = base.getBoundingClientRect();
	}, { passive: false });

	base.addEventListener('touchmove', (e) => {
		e.preventDefault();
		// Find our tracked touch
		const touch = [...e.changedTouches].find(t => t.identifier === activeTouchId);
		if (!touch) return;

		// Get position relative to center of base
		const centerX = baseRect.left + baseRect.width / 2;
		const centerY = baseRect.top + baseRect.height / 2;
		let dx = touch.clientX - centerX;
		let dy = touch.clientY - centerY;

		// Clamp to max distance
		const dist = Math.sqrt(dx * dx + dy * dy);
		if (dist > maxDist) {
			dx = (dx / dist) * maxDist;
			dy = (dy / dist) * maxDist;
		}

		// Move the thumb visually
		thumb.style.transform = `translate(${dx}px, ${dy}px)`;

		// Normalize to -1..1 and send to Godot
		window.godotInputState.x = dx / maxDist;
		window.godotInputState.y = dy / maxDist;

	}, { passive: false });

	function resetJoystick() {
		activeTouchId = null;
		thumb.style.transform = 'translate(0px, 0px)';
		window.godotInputState.x = 0;
		window.godotInputState.y = 0;
	}

	base.addEventListener('touchend', (e) => { e.preventDefault(); resetJoystick(); }, { passive: false });
	base.addEventListener('touchcancel', (e) => { e.preventDefault(); resetJoystick(); }, { passive: false });

	// Action button
	const btnAction = document.getElementById('btn-action');
	btnAction.addEventListener('touchstart', (e) => {
		e.preventDefault();
		window.godotInputState.action = true;
	}, { passive: false });
	btnAction.addEventListener('touchend', (e) => {
		e.preventDefault();
		window.godotInputState.action = false;
	}, { passive: false });
</script>
</body>

</html>
